<svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="primaryGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0062a3" />
      <stop offset="50%" stop-color="#3a8ee6" />
      <stop offset="100%" stop-color="#9ecafe" />
    </linearGradient>
    <linearGradient id="secondaryGrad" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#526070" />
      <stop offset="100%" stop-color="#bac8db" />
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="#000" flood-opacity="0.15" />
    </filter>
  </defs>
  
  <!-- 外围正方形（样方象征），大圆角，带有渐变描边 -->
  <rect x="15" y="15" width="70" height="70" rx="20" stroke="url(#primaryGrad)" stroke-width="6" filter="url(#shadow)" />
  
  <!-- 内部交织节点（标记重捕象征） -->
  <!-- 节点之间的连线，平滑圆润 -->
  <line x1="50" y1="35" x2="35" y2="65" stroke="url(#primaryGrad)" stroke-width="4" stroke-linecap="round" />
  <line x1="50" y1="35" x2="65" y2="65" stroke="url(#primaryGrad)" stroke-width="4" stroke-linecap="round" />
  <line x1="35" y1="65" x2="65" y2="65" stroke="url(#secondaryGrad)" stroke-width="3" stroke-linecap="round" stroke-dasharray="4 4" />

  <!-- 节点1 (上) -->
  <circle cx="50" cy="35" r="10" fill="url(#primaryGrad)" />
  <!-- 节点2 (左下) -->
  <circle cx="35" cy="65" r="8" fill="url(#secondaryGrad)" />
  <!-- 节点3 (右下) -->
  <circle cx="65" cy="65" r="8" fill="url(#primaryGrad)" />
</svg>