<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <!-- 视口设置，确保移动端缩放正常 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="icon" href="../Icon.svg" type="image/svg+xml">
    <title>标记重捕模拟实验</title>
    <!-- 引入 Outfit 字体与 Noto Sans SC 中文字体 -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../modules/qr-popup/css/qr-popup.css">
    <!-- 引入外部 CSS -->
    <link rel="stylesheet" href="styles.css">
</head>

<body>
<a href="../index.html" class="back-to-home">🏠</a>
<div id="app">
    <!-- 控制面板 -->
    <div id="control-panel">
        <h2>标记重捕实验</h2>
        
        <div class="tab-container">
            <div class="tab active" data-tab="main">操作</div>
            <div class="tab" data-tab="settings">设置</div>
        </div>
        
        <div class="tab-content active" id="main-tab">
            <div id="status-text" class="status-box">点击"重置"初始化</div>

            <div class="btn-group">
                <button id="btn-start-1" disabled>
                    <span>1. 第一次捕获</span>
                    <span id="count-1" class="btn-count">0/0</span>
                </button>
                <button id="btn-mark" disabled>
                    <span>2. 标记并释放</span>
                </button>
                <button id="btn-start-2" disabled>
                    <span>3. 第二次捕获</span>
                    <span id="count-2" class="btn-count">0/0</span>
                </button>
                <button id="btn-calculate" disabled>
                    <span>4. 计算结果</span>
                </button>
                <button class="secondary">重置 / 生成动物</button>
            </div>

            <div class="log-area" id="log-content"></div>
        </div>
        
        <div class="tab-content" id="settings-tab">
            <div class="settings-group">
                <label>动物总数 (N)</label>
                <input type="number" id="setting-count" value="100" min="10" max="2000">
            </div>
            <div class="settings-group">
                <label>移动速度 (1-10)</label>
                <input type="number" id="setting-speed" value="1" min="1" max="10">
            </div>
            <div class="settings-group">
                <label>动物大小 (1-30)</label>
                <input type="number" id="setting-size" value="30" min="1" max="30">
            </div>
            <div class="settings-group">
                <label>第一次捕获限制</label>
                <input type="number" id="setting-limit1" value="20" min="5" max="100">
            </div>
            <div class="settings-group">
                <label>第二次捕获限制</label>
                <input type="number" id="setting-limit2" value="10" min="5" max="100">
            </div>
            
            <button class="secondary share-btn">
                🔗 生成分享链接
            </button>
        </div>
    </div>

    <!-- 模拟区域 -->
    <div id="simulation-area">
        <canvas id="simCanvas"></canvas>
        <div id="canvas-tooltip" class="tooltip">准备就绪</div>
    </div>
</div>

<!-- 引入依赖库 -->
<script src="../modules/qr-popup/js/qrcode.min.js"></script>
<!-- 引入功能模块 -->
<script src="../modules/qr-popup/js/qr-popup.js"></script>

<!-- 引入主入口 ES 模块 -->
<script type="module" src="js/main.js"></script>
</body>

</html>
